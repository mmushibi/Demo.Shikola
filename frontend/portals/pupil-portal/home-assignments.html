<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikola - Home Assignments</title>
    <link rel="icon" type="image/png" href="../../assets/images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../../shared-assets/js/dashboard-theme.js"></script>
    <script src="../../../shared-assets/js/shared-auth.js"></script>
    <script src="../../../shared-assets/js/button-functions.js"></script>
    <script src="../../../shared-assets/js/shared-realtime-sync.js"></script>
    <script src="../../../shared-assets/js/pupil-assignments-realtime.js"></script>
    <script src="../../../shared-assets/js/assignment-upload-manager.js"></script>
    <script src="../../../shared-assets/js/cross-portal-assignments-sync.js"></script>
    <script src="../../../shared-assets/js/assignment-offline-support.js"></script>
    <script src="../../../shared-assets/js/assignment-background-sync.js"></script>
    <script src="../../../shared-assets/js/assignment-notification-system.js"></script>
    <script src="../../../public/pupil-mock-data.js"></script>
    <script src="pupil-assignments-data-loader.js"></script>
    <script src="pupil-functionality.js"></script>
    <script src="assignments.js"></script>
    <script src="../../../shared-assets/js/shared-auth.js" defer></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="pupil-security.js"></script>
    <script src="../../../shared-assets/js/portal-auth-guard.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body class="dashboard-page">
    <div x-data="assignmentsPage()" class="min-h-screen flex">
        <div class="flex-1 flex gap-4 lg:gap-8 w-full" :class="{ 'pointer-events-none opacity-50': loading }">
            <aside class="hidden lg:flex fixed inset-y-0 left-0 w-64 bg-white shadow-xl flex-col py-8 px-6 z-40 overflow-y-auto">
                <div class="flex justify-center mb-10">
                    <img src="../../assets/images/logo.png" alt="Shikola logo" class="h-15 w-20 rounded-2xl object-cover">
                </div>

                <nav class="space-y-1 text-sm">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-chart-pie"></i></span>
                        <span class="font-medium flex-1">Dashboard</span>
                    </a>
                    <a href="my-timetable.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-calendar-alt"></i></span>
                        <span class="flex-1">My Timetable</span>
                    </a>
                    <a href="my-report-card.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-file-alt"></i></span>
                        <span class="flex-1">My Report Card</span>
                    </a>
                    <a href="home-assignments.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow-md">
                        <span class="w-6 flex justify-center"><i class="fas fa-book"></i></span>
                        <span class="flex-1">Home Assignments</span>
                    </a>
                 
                </nav>

                <div class="mt-auto pt-8 border-t border-slate-100">
                    <div class="flex items-center justify-center px-2">
                        <a href="/index.html" data-action="logout" class="flex items-center gap-2 px-3 py-2 rounded-xl text-red-500 hover:bg-red-50 text-xs font-medium">
                            <span class="w-5 flex justify-center"><i class="fas fa-right-from-bracket"></i></span>
                            <span>Logout</span>
                        </a>
                    </div>
                </div>
            </aside>

            <div x-show="sidebarOpen" x-cloak class="fixed inset-0 z-50 flex lg:hidden pointer-events-auto">
                <div class="absolute inset-0 bg-slate-900/40" @click="sidebarOpen = false"></div>
                <aside class="relative h-full w-64 bg-white shadow-xl flex flex-col py-8 px-6">
                    <button type="button" class="absolute top-4 right-4 h-8 w-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500" aria-label="Close navigation" @click="sidebarOpen = false">
                        <i class="fas fa-times text-sm"></i>
                    </button>
                    <div class="flex justify-center mb-10">
                        <img src="../../assets/images/logo.png" alt="Shikola logo" class="h-15 w-20 rounded-2xl object-cover">
                    </div>

                    
                <nav class="space-y-1 text-sm">
                    <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-chart-pie"></i></span>
                        <span class="font-medium flex-1">Dashboard</span>
                    </a>
                    <a href="my-timetable.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-calendar-alt"></i></span>
                        <span class="flex-1">My Timetable</span>
                    </a>
                    <a href="my-report-card.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 transition">
                        <span class="w-6 flex justify-center"><i class="fas fa-file-alt"></i></span>
                        <span class="flex-1">My Report Card</span>
                    </a>
                    <a href="home-assignments.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-orange-400 to-orange-500 text-white shadow-md">
                        <span class="w-6 flex justify-center"><i class="fas fa-book"></i></span>
                        <span class="flex-1">Home Assignments</span>
                    </a>
                </nav>

                    <div class="mt-auto pt-8 border-t border-slate-100">
                        <div class="flex items-center justify-center px-2">
                            <a href="/index.html" data-action="logout" class="flex items-center gap-2 px-3 py-2 rounded-xl text-red-500 hover:bg-red-50 text-xs font-medium">
                                <span class="w-5 flex justify-center"><i class="fas fa-right-from-bracket"></i></span>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </aside>
            </div>

            <main class="flex-1 w-full px-3 sm:px-6 py-6 lg:pl-72">
                <div class="bg-white rounded-3xl shadow-xl px-4 sm:px-6 lg:px-8 py-5 lg:py-7 h-full flex flex-col">
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                        <div class="flex items-center justify-center w-full lg:w-auto lg:justify-start gap-3">
                            <button type="button" class="lg:hidden fixed top-4 left-4 z-40 h-9 w-9 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500 shadow-sm pointer-events-auto" aria-label="Open navigation" @click="sidebarOpen = true">
                                <i class="fas fa-bars"></i>
                            </button>
                            <img src="../../assets/images/logo.png" alt="Shikola logo" class="h-14 w-auto rounded-2xl lg:hidden">
                            <div class="text-center lg:text-left">
                                <h1 class="text-2xl sm:text-3xl font-semibold text-slate-800" x-text="pageTitle"></h1>
                                <p class="hidden sm:block text-xs sm:text-sm text-slate-400 mt-1" x-text="pageSubtitle"></p>
                            </div>
                        </div>
                        <div class="hidden sm:flex items-center gap-3">
                            <div class="hidden sm:flex items-center bg-slate-50 px-3 py-2 rounded-xl border border-slate-100 w-56">
                                <i class="fas fa-search text-slate-400 text-sm mr-2"></i>
                                <input type="text" placeholder="Search assignments..." class="bg-transparent text-sm text-slate-600 placeholder-slate-400 focus:outline-none flex-1" x-model.debounce.300ms="searchQuery">
                            </div>
                            <button class="h-9 w-9 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 hover:text-slate-600" type="button" aria-label="Notifications">
                                <i class="far fa-bell"></i>
                            </button>
                            <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                                <button type="button" class="flex items-center gap-2 pl-1" @click="open = !open" title="User menu">
                                    <div class="h-9 w-9 rounded-full bg-gradient-to-tr from-orange-400 to-pink-500 text-white flex items-center justify-center text-sm">
                                        <i class="fas fa-user"></i>
                                    </div>
                                    <div class="hidden sm:block text-left">
                                        <div class="text-xs font-medium text-slate-700">Shikola</div>
                                        <div class="text-[10px] text-slate-400">Pupil</div>
                                    </div>
                                </button>
                                <div
                                    x-show="open"
                                    x-cloak
                                    class="absolute right-0 mt-2 w-44 rounded-xl bg-white shadow-lg border border-slate-100 py-1 text-xs text-slate-600 z-30">
                                
                                    <div class="my-1 border-t border-slate-100"></div>
                                    <a href="/index.html" data-action="logout" class="flex items-center gap-2 px-3 py-1.5 hover:bg-red-50 text-red-500">
                                        <span class="w-4 flex justify-center">
                                            <i class="fas fa-right-from-bracket"></i>
                                        </span>
                                        <span>Logout</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6">
                        <div class="flex flex-col gap-3">
                            <div class="text-xs text-slate-500 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                                <span x-text="sharingNotice()"></span>
                                <span class="text-[11px] text-slate-400" x-text="lastSyncedLabel()"></span>
                            </div>

                            <div x-show="error" x-cloak class="rounded-2xl border border-red-200 bg-red-50 text-red-700 text-xs px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                <span x-text="error"></span>
                                <button type="button" class="px-3 py-1.5 rounded-lg border border-red-200 text-red-600 font-medium hover:bg-red-100" @click="loadAssignments()">Try again</button>
                            </div>
                            <div x-show="loading && !error" x-cloak class="rounded-2xl border border-slate-100 bg-slate-50 text-slate-500 text-xs px-4 py-3 flex items-center gap-2">
                                <span class="h-2 w-2 rounded-full bg-slate-400 animate-pulse"></span>
                                Syncing live assignments...
                            </div>
                        </div>

                        <div class="mt-4 flex gap-2 overflow-x-auto pb-1 -mx-1 px-1 text-xs sm:text-sm">
                            <button type="button" @click="activeTab = 'pending'" :class="activeTab === 'pending' ? 'bg-slate-900 text-white shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'" class="flex items-center gap-2 px-3 py-2 rounded-full whitespace-nowrap border border-slate-200">
                                <span class="w-5 flex justify-center"><i class="fas fa-clock"></i></span>
                                <span>Pending</span>
                            </button>
                            <button type="button" @click="activeTab = 'submitted'" :class="activeTab === 'submitted' ? 'bg-slate-900 text-white shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'" class="flex items-center gap-2 px-3 py-2 rounded-full whitespace-nowrap border border-slate-200">
                                <span class="w-5 flex justify-center"><i class="fas fa-check-circle"></i></span>
                                <span>Submitted</span>
                            </button>
                            <button type="button" @click="activeTab = 'graded'" :class="activeTab === 'graded' ? 'bg-slate-900 text-white shadow-sm' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'" class="flex items-center gap-2 px-3 py-2 rounded-full whitespace-nowrap border border-slate-200">
                                <span class="w-5 flex justify-center"><i class="fas fa-star"></i></span>
                                <span>Graded</span>
                            </button>
                        </div>
                    </div>

                    <div class="mt-6 flex-1 space-y-6 text-sm">
                        <!-- Pending Assignments Tab -->
                        <section x-show="activeTab === 'pending'" x-cloak>
                            <template x-if="!loading && !error && filteredPending().length === 0">
                                <div class="bg-slate-50 border border-dashed border-slate-200 rounded-2xl p-6 text-center text-xs text-slate-500">
                                    No pending assignments yet. Your teacher will publish tasks here for the whole class.
                                </div>
                            </template>

                            <div x-show="filteredPending().length > 0" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                                <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-5">
                                    <div class="flex-1 space-y-4">
                                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                            <div>
                                                <div class="text-sm font-semibold text-slate-800">Pending Assignments</div>
                                                <div class="text-xs text-slate-400 mt-1">Assignments that need to be completed.</div>
                                            </div>
                                            <div class="flex flex-wrap gap-2 text-xs">
                                                <select class="rounded-xl border border-slate-200 bg-slate-50 px-2.5 py-1.5 text-xs text-slate-600" aria-label="Filter by subject" x-model="filters.pending.subject">
                                                    <option value="all">All Subjects</option>
                                                    <template x-for="subject in pendingSubjectOptions()" :key="subject">
                                                        <option x-text="subject"></option>
                                                    </template>
                                                </select>
                                                <select class="rounded-xl border border-slate-200 bg-slate-50 px-2.5 py-1.5 text-xs text-slate-600" aria-label="Filter by priority" x-model="filters.pending.priority">
                                                    <option value="all">All Priority</option>
                                                    <option value="high">High</option>
                                                    <option value="medium">Medium</option>
                                                    <option value="low">Low</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="space-y-3">
                                            <template x-for="assignment in filteredPending()" :key="assignment.id">
                                                <div class="rounded-xl border p-4" :class="priorityTone(assignment.priority)">
                                                    <div class="flex items-start justify-between mb-3">
                                                        <div class="flex-1">
                                                            <div class="flex flex-wrap items-center gap-2 mb-2">
                                                                <span class="px-2 py-1 rounded-full text-[10px] font-medium" :class="priorityBadge(assignment.priority)" x-text="assignment.priorityLabel"></span>
                                                                <span class="px-2 py-1 rounded-full text-[10px] font-medium" :class="subjectBadge(assignment.subject)" x-text="assignment.subject"></span>
                                                                <span class="text-[10px] text-slate-500" x-text="assignment.dueLabel"></span>
                                                            </div>
                                                            <h4 class="font-medium text-slate-800 text-sm mb-1" x-text="assignment.title"></h4>
                                                            <p class="text-[11px] text-slate-600 mb-2" x-text="assignment.summary"></p>
                                                            <div class="flex flex-wrap items-center gap-3 text-[10px] text-slate-500">
                                                                <span><i class="fas fa-user mr-1"></i><span x-text="assignment.teacher"></span></span>
                                                                <span><i class="fas fa-calendar mr-1"></i>Assigned: <span x-text="assignment.assignedOn"></span></span>
                                                                <span><i class="fas fa-clock mr-1"></i>Due: <span x-text="assignment.dueOn"></span></span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="flex flex-wrap gap-2">
                                                        <button type="button" class="px-3 py-1.5 rounded-xl text-white text-xs font-medium" :class="assignment.primaryButtonClass" @click="handleAction('submit', assignment)">Submit Now</button>
                                                        <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('details', assignment)">View Details</button>
                                                        <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('download', assignment)">Download Files</button>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="w-full lg:w-72 xl:w-80 space-y-3 text-xs">
                                        <div class="rounded-2xl border border-slate-100 bg-slate-50/80 p-4 space-y-3">
                                            <div class="text-[11px] uppercase tracking-wide text-slate-500">Assignment Summary</div>
                                            <template x-if="summaryCounts()">
                                                <div class="space-y-2">
                                                    <div class="flex justify-between">
                                                        <span class="text-slate-600">Total Pending:</span>
                                                        <span class="font-medium text-red-600" x-text="summaryCounts().totalPending"></span>
                                                    </div>
                                                    <div class="flex justify-between">
                                                        <span class="text-slate-600">Due This Week:</span>
                                                        <span class="font-medium text-orange-600" x-text="summaryCounts().dueThisWeek"></span>
                                                    </div>
                                                    <div class="flex justify-between">
                                                        <span class="text-slate-600">Overdue:</span>
                                                        <span class="font-medium text-red-600" x-text="summaryCounts().overdue"></span>
                                                    </div>
                                                    <div class="flex justify-between">
                                                        <span class="text-slate-600">Submitted Today:</span>
                                                        <span class="font-medium text-emerald-600" x-text="summaryCounts().submittedToday"></span>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                        <div class="rounded-2xl border border-slate-100 bg-slate-50/80 p-4 space-y-3">
                                            <div class="text-[11px] uppercase tracking-wide text-slate-500">Upcoming Deadlines</div>
                                            <div class="space-y-2">
                                                <template x-if="upcomingDeadlines().length === 0">
                                                    <div class="text-slate-400 text-xs">No upcoming deadlines.</div>
                                                </template>
                                                <template x-for="assignment in upcomingDeadlines()" :key="assignment.id">
                                                    <div class="flex items-center gap-2">
                                                        <div class="w-2 h-2 rounded-full bg-slate-400"></div>
                                                        <span class="text-slate-600" x-text="assignment.title"></span>
                                                        <span class="text-slate-500 text-[11px]" x-text="assignment.dueLabel"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Submitted Assignments Tab -->
                        <section x-show="activeTab === 'submitted'" x-cloak>
                            <template x-if="!loading && !error && filteredSubmitted().length === 0">
                                <div class="bg-slate-50 border border-dashed border-slate-200 rounded-2xl p-6 text-center text-xs text-slate-500">
                                    Once you submit an assignment it appears here for your teacher and classmates instantly.
                                </div>
                            </template>

                            <div x-show="filteredSubmitted().length > 0" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                                <div class="text-sm font-semibold text-slate-800 mb-4">Submitted Assignments</div>
                                <div class="space-y-3">
                                    <template x-for="assignment in filteredSubmitted()" :key="assignment.id">
                                        <div class="rounded-xl border border-slate-200 bg-white p-4">
                                            <div class="flex items-start justify-between mb-3">
                                                <div class="flex-1">
                                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                                        <span class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 text-[10px] font-medium">Submitted</span>
                                                        <span class="px-2 py-1 rounded-full text-[10px] font-medium" :class="subjectBadge(assignment.subject)" x-text="assignment.subject"></span>
                                                        <span class="text-[10px] text-slate-500" x-text="assignment.statusLabel || 'Awaiting grading'"></span>
                                                    </div>
                                                    <h4 class="font-medium text-slate-800 text-sm mb-1" x-text="assignment.title"></h4>
                                                    <p class="text-[11px] text-slate-600 mb-2" x-text="assignment.summary"></p>
                                                    <div class="flex flex-wrap items-center gap-3 text-[10px] text-slate-500">
                                                        <span><i class="fas fa-user mr-1"></i><span x-text="assignment.teacher"></span></span>
                                                        <span><i class="fas fa-calendar mr-1"></i>Submitted: <span x-text="assignment.submittedOn || '—'"></span></span>
                                                        <span x-show="assignment.submittedTime"><i class="fas fa-clock mr-1"></i><span x-text="assignment.submittedTime"></span></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="flex flex-wrap gap-2">
                                                <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('details', assignment)">View Submission</button>
                                                <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('receipt', assignment)">Download Receipt</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </section>

                        <!-- Graded Assignments Tab -->
                        <section x-show="activeTab === 'graded'" x-cloak>
                            <template x-if="!loading && !error && filteredGraded().length === 0">
                                <div class="bg-slate-50 border border-dashed border-slate-200 rounded-2xl p-6 text-center text-xs text-slate-500">
                                    Graded work will appear here the moment your teacher posts marks.
                                </div>
                            </template>

                            <div x-show="filteredGraded().length > 0" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
                                <div class="text-sm font-semibold text-slate-800 mb-4">Graded Assignments</div>
                                <div class="space-y-3">
                                    <template x-for="assignment in filteredGraded()" :key="assignment.id">
                                        <div class="rounded-xl border border-emerald-200 bg-emerald-50 p-4">
                                            <div class="flex items-start justify-between mb-3">
                                                <div class="flex-1">
                                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                                        <span class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 text-[10px] font-medium">Graded</span>
                                                        <span class="px-2 py-1 rounded-full text-[10px] font-medium" :class="subjectBadge(assignment.subject)" x-text="assignment.subject"></span>
                                                        <span class="px-2 py-1 rounded-full text-[10px] font-medium" :class="gradeChipClass(assignment.grade)" x-text="assignment.grade ? ('Grade: ' + assignment.grade) : 'Awaiting grade'"></span>
                                                    </div>
                                                    <h4 class="font-medium text-slate-800 text-sm mb-1" x-text="assignment.title"></h4>
                                                    <p class="text-[11px] text-slate-600 mb-2" x-text="assignment.summary"></p>
                                                    <div class="flex flex-wrap items-center gap-3 text-[10px] text-slate-500">
                                                        <span><i class="fas fa-user mr-1"></i><span x-text="assignment.teacher"></span></span>
                                                        <span><i class="fas fa-calendar mr-1"></i>Graded: <span x-text="assignment.gradedOn || '—'"></span></span>
                                                        <span x-show="assignment.score"><i class="fas fa-star mr-1 text-emerald-600"></i><span x-text="assignment.score"></span></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="bg-white rounded-lg p-3 mb-2" x-show="assignment.feedback">
                                                <div class="text-xs font-medium text-slate-700 mb-1">Teacher's Feedback:</div>
                                                <p class="text-[11px] text-slate-600 italic" x-text="assignment.feedback"></p>
                                            </div>
                                            <div class="flex flex-wrap gap-2">
                                                <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('details', assignment)">View Details</button>
                                                <button type="button" class="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-slate-600 text-xs hover:bg-slate-50" @click="handleAction('certificate', assignment)">Download Certificate</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
