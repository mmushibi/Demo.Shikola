            const colors = {
                'A+': 'grade-a-plus',
                'A': 'grade-a',
                'B+': 'grade-b-plus',
                'B': 'grade-b',
                'C+': 'grade-c-plus',
                'C': 'grade-c',
                'D': 'grade-d',
                'F': 'grade-f'
            };
            return colors[grade] || 'bg-slate-100 text-slate-600';
        }

                'term1': 'term1Btn',
                'term2': 'term2Btn',
                'term3': 'term3Btn',
                'annual': 'annualBtn'
            };

                    : 'flex items-center gap-2 px-3 py-2 rounded-full whitespace-nowrap border border-slate-200 bg-slate-50 text-slate-500 hover:bg-slate-100';
            });
        }

            currentCardType = type;
            updateButtonStyles();
            renderReportCard();

            currentTerm = term;
            updateButtonStyles();
            renderReportCard();

        function renderReportCard() {
            const container = document.getElementById('reportCardContent');
            
            // Ensure we have valid data structure
            if (!reportCardData || !reportCardData.terms) {
                console.error('Report card data not available');
                return;
            }
            
            // Debug: Log current state
            console.log('Current Term:', currentTerm);
            console.log('Current Card Type:', currentCardType);
            console.log('Available terms:', Object.keys(reportCardData.terms));
            console.log('Available card types for term:', currentTerm, Object.keys(reportCardData.terms[currentTerm] || {}));
            
            let data = reportCardData.terms[currentTerm]?.[currentCardType];
            console.log('Found data:', data);
            
            // Fallback: if data is null, try to force access to term1 resultCard
            if (!data && currentTerm === 'term1' && currentCardType === 'result') {
                console.log('Using fallback data access');
                data = reportCardData.terms.term1.resultCard;
                console.log('Fallback data:', data);
            }
            
            if (!data) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="inline-flex flex-col items-center gap-4">
                            <div class="h-16 w-16 rounded-full bg-slate-100 flex items-center justify-center">
                                <i class="fas fa-file-alt text-slate-400 text-xl"></i>
                            </div>
                            <div>

                                <p class="text-sm text-slate-500">Your ${currentCardType === 'result' ? 'Result Card' : 'Report Card'} for ${currentTerm === 'annual' ? 'Annual Summary' : currentTerm} will appear here once your school publishes it.</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            if (currentTerm === 'annual') {
                container.innerHTML = renderAnnualSummary(data);
            } else {
                container.innerHTML = renderTermReport(data);
            }
        }

                            </div>
                        </div>
                    </div>

                        </div>

                                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase tracking-wider">Subject</th>
                                        <th class="px-6 py-3 text-center text-xs font-medium text-slate-600 uppercase tracking-wider">Score</th>

                                </thead>

                                    ${subjectsHtml}

                        </div>
                    </div>
                    
                    <!-- Attendance and Conduct -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <div class="space-y-3">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-600">Total School Days</span>
                                    <span class="font-medium text-slate-800">${data.attendance.totalDays}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-600">Days Present</span>
                                    <span class="font-medium text-green-600">${data.attendance.presentDays}</span>
                                </div>
                                <div class="flex justify-between items-center">

                                    </div>
                                    <div class="mt-2 bg-slate-200 rounded-full h-2">
                                        <div class="bg-green-500 h-2 rounded-full" style="width: ${data.attendance.percentage}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-2xl border border-slate-200 p-6">

                                </div>
                            </div>
                        </div>
                    </div>
                </div>

        }

        function renderAnnualSummary(data) {
            const progressionHtml = data.termProgression.map(term => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${term.term}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-center font-semibold text-slate-800">${term.average}%</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-slate-600">${term.position}/${data.totalPupils}</td>
                </tr>
            `).join('');

            return `
                <div class="space-y-6">
                    <!-- Student Information -->
                    <div class="bg-gradient-to-r from-orange-50 to-orange-100 rounded-2xl p-6 border border-orange-200">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                                <h3 class="text-lg font-semibold text-slate-800 mb-3">Student Information</h3>
                                <div class="space-y-2 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-slate-600">Name:</span>
                                        <span class="font-medium text-slate-800">${reportCardData.currentPupil.first_name} ${reportCardData.currentPupil.last_name}</span>

                                        <span class="text-slate-600">Class:</span>
                                        <span class="font-medium text-slate-800">${reportCardData.currentPupil.class_name}</span>
                                    </div>
                                    <div class="flex justify-between">

                                    </div>
                                </div>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-slate-800 mb-3">Annual Summary</h3>
                                <div class="space-y-2 text-sm">
                                    <div class="flex justify-between">
                                        <span class="text-slate-600">Overall Average:</span>
                                        <span class="font-medium text-slate-800">${data.overallAverage}%</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-slate-600">Overall Grade:</span>
                                        <span class="font-bold text-orange-600 text-lg">${data.overallGrade}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-slate-600">Overall Position:</span>
                                        <span class="font-medium text-slate-800">${data.overallPosition}/${data.totalPupils}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-slate-600">Attendance Rate:</span>
                                        <span class="font-medium text-slate-800">${data.attendanceRate}%</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Term Progression -->
                    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                            <h3 class="text-lg font-semibold text-slate-800">Term Progression</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase tracking-wider">Term</th>
                                        <th class="px-6 py-3 text-center text-xs font-medium text-slate-600 uppercase tracking-wider">Average</th>
                                        <th class="px-6 py-3 text-center text-xs font-medium text-slate-600 uppercase tracking-wider">Position</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-200">
                                    ${progressionHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <!-- Achievements -->

                        <div class="bg-white rounded-2xl border border-slate-200 p-6">
                            <h3 class="text-lg font-semibold text-slate-800 mb-4">Academic Achievements</h3>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-600">Best Subject:</span>
                                    <span class="font-medium text-slate-800">${data.bestSubject}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-600">Best Subject Score:</span>
                                    <span class="font-medium text-green-600">${data.bestSubjectScore}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-slate-600">Most Improved:</span>
                                    <span class="font-medium text-orange-600">${data.mostImproved}</span>
                                </div>
                                <div class="pt-3 border-t border-slate-200">
                                    <div class="flex justify-between items-center">
                                        <span class="text-sm font-medium text-slate-700">Best Performance:</span>
                                        <span class="text-sm font-bold text-green-600">${data.bestPerformance}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-2xl border border-slate-200 p-6">
                            <h3 class="text-lg font-semibold text-slate-800 mb-4">Year Summary</h3>
                            <div class="space-y-4">
                                <div class="text-center">
                                    <div class="text-3xl font-bold text-orange-600 mb-2">${data.overallAverage}%</div>

                                </div>
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-green-600 mb-2">${data.overallPosition}/${data.totalPupils}</div>
                                    <div class="text-sm text-slate-600">Class Position</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-lg font-bold text-blue-600 mb-2">${data.overallGrade}</div>
                                    <div class="text-sm text-slate-600">Overall Grade</div>

            // Force test data access

            renderReportCard();
