<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Shikola</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Glacial+Indifference:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e'
            },
            accent: '#0ea5e9',
            dark: '#082f49'
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 2s infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spin-slow': 'spin 12s linear infinite',
            'bounce-slow': 'bounce 3s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
              '50%': { transform: 'translateY(-20px) rotate(2deg)' },
            }
          }
        }
      }
    }
  </script>    <script src="../js/security.js"></script>

  <style>
    body { 
      font-family: 'Glacial Indifference', sans-serif; 
      background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 45%, #bae6fd 100%);
      min-height: 100vh;
    }
    .bg-shikola {
      background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 55%),
                  radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 45%),
                  radial-gradient(circle at bottom right, rgba(2, 132, 199, 0.12), transparent 50%),
                  linear-gradient(135deg, rgba(224, 242, 254, 0.95), rgba(255, 255, 255, 0.92));
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.25);
    }
    .glass-button {
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .glass-button:hover {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(14, 165, 233, 0.3);
    }
    .number-4 {
      background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 10px 40px rgba(14, 165, 233, 0.3);
    }
    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
    }
    .shape-1 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(2, 132, 199, 0.1));
      top: -100px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .shape-2 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(14, 165, 233, 0.1));
      bottom: -50px;
      left: -50px;
      animation: float 10s ease-in-out 1s infinite;
    }
    .shape-3 {
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, rgba(186, 230, 253, 0.3), rgba(125, 211, 252, 0.1));
      top: 50%;
      right: 10%;
      animation: float 7s ease-in-out 0.5s infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(5deg); }
    }
    .search-input:focus {
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.2);
    }
  </style>
</head>
<body class="bg-shikola flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Animated Background Shapes -->
  <div class="floating-shape shape-1"></div>
  <div class="floating-shape shape-2"></div>
  <div class="floating-shape shape-3"></div>

  <!-- Small Decorative Elements -->
  <div class="absolute top-20 left-20 w-4 h-4 bg-primary-400 rounded-full opacity-40 animate-pulse-slow"></div>
  <div class="absolute bottom-32 right-32 w-3 h-3 bg-primary-500 rounded-full opacity-30 animate-pulse"></div>
  <div class="absolute top-40 right-40 w-2 h-2 bg-primary-300 rounded-full opacity-50 animate-bounce-slow"></div>
  
  <!-- Main Content Card -->
  <div class="glass-card rounded-3xl p-8 md:p-12 max-w-2xl w-full text-center relative z-10">
    
    <!-- Logo -->
    <div class="mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 text-xl font-bold text-dark hover:opacity-80 transition-opacity">
        <img src="../assets/images/logo.png" alt="Shikola" class="h-12 w-auto" />
      </a>
    </div>

    <!-- 404 Animation -->
    <div class="relative mb-8">
      <!-- Large 404 with Book Icon in middle -->
      <div class="flex items-center justify-center gap-2 md:gap-4">
        <span class="text-8xl md:text-9xl font-black number-4 animate-float">4</span>
        
        <!-- Animated Book Icon -->
        <div class="relative animate-float-delayed">
          <div class="w-24 h-24 md:w-32 md:h-32 bg-gradient-to-br from-primary-400 to-primary-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-primary-500/30 transform rotate-12 hover:rotate-0 transition-transform duration-500">
            <svg class="w-14 h-14 md:w-16 md:h-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
          </div>
          <!-- Question mark bubble -->
          <div class="absolute -top-2 -right-2 w-10 h-10 bg-orange-400 rounded-full flex items-center justify-center animate-bounce shadow-lg">
            <span class="text-white font-bold text-lg">?</span>
          </div>
        </div>
        
        <span class="text-8xl md:text-9xl font-black number-4 animate-float">4</span>
      </div>
    </div>

    <!-- Error Message -->
    <h1 class="text-2xl md:text-3xl font-bold text-dark mb-3">
      Page Not Found
    </h1>
    <p class="text-slate-600 text-base md:text-lg mb-8 max-w-md mx-auto leading-relaxed">
      Oops! It seems this page has gone on a study break. The chapter you're looking for doesn't exist in our library.
    </p>

    <!-- Search Box -->
    <div class="mb-8">
      <div class="relative max-w-md mx-auto">
        <input 
          type="text" 
          placeholder="Search for what you need..." 
          class="search-input w-full rounded-full border border-primary-200 bg-white/80 px-6 py-4 pr-14 text-slate-700 placeholder-slate-400 focus:border-primary-400 focus:outline-none transition-all"
        >
        <button type="button" title="Search" class="absolute right-2 top-1/2 -translate-y-1/2 rounded-full bg-primary-500 p-2.5 text-white hover:bg-primary-600 transition-colors shadow-lg shadow-primary-500/30">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a href="index.html" class="glass-button rounded-full px-8 py-4 text-primary-700 font-semibold flex items-center gap-2 hover:text-primary-800">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Back to Home
      </a>
      <a href="signin.html" class="rounded-full bg-primary-500 px-8 py-4 text-white font-semibold hover:bg-primary-600 transition-all hover:shadow-lg hover:shadow-primary-500/30 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
        Sign In to Portal
      </a>
    </div>

    <!-- Helpful Links -->
    <div class="mt-10 pt-8 border-t border-primary-100">
      <p class="text-sm text-slate-500 mb-4">Popular Destinations</p>
      <div class="flex flex-wrap justify-center gap-3">
        <a href="signup.html" class="px-4 py-2 rounded-full bg-primary-50 text-primary-600 text-sm font-medium hover:bg-primary-100 transition-colors">
          Get Started
        </a>
        <a href="signin.html" class="px-4 py-2 rounded-full bg-primary-50 text-primary-600 text-sm font-medium hover:bg-primary-100 transition-colors">
          Sign In
        </a>
        <a href="#contact" onclick="window.location.href='index.html#contact'" class="px-4 py-2 rounded-full bg-primary-50 text-primary-600 text-sm font-medium hover:bg-primary-100 transition-colors">
          Support
        </a>
      </div>
    </div>

    <!-- Error Code -->
    <div class="mt-8 text-xs text-slate-400">
      Error Code: 404 | Page Missing in Action
    </div>
  </div>

  <!-- Back to Top Floating Button -->
  <button 
    onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
    class="fixed bottom-6 right-6 w-12 h-12 bg-primary-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-primary-500/30 hover:bg-primary-600 transition-all hover:scale-110 z-50"
    title="Scroll to top"
  >
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
  </button>

</body>
</html>
